name: CoolDecide bot

# Fully automated — no PC needed. Checks in hourly; a CHEAP gate step decides
# whether now is one of today's randomly-chosen posting slots, and only then does
# the expensive work of rendering + uploading. Credentials come from repo Secrets.
#
# The gate exists to protect the free Actions minutes: GitHub bills every job
# rounded up to a whole minute, so an idle check-in must stay tiny.

on:
  schedule:
    # HOURLY, 8am–11pm ET. This is the SAFETY NET, and on 2026-07-20 it was the
    # only thing standing between a dead trigger and a silently dead channel — so
    # it has to be dense enough to actually catch a slot.
    #
    # It was thinned to every ~2 hours once the Cloudflare worker took over precise
    # posting via `post-now`. Then the worker stopped dispatching entirely (both its
    # jobs went silent after 01:48 UTC and never resumed), and the 16:27 slot was
    # missed outright: at 2-hourly spacing the fallback can sit ~2h behind a slot,
    # and GitHub's own cron only delivered 2 of the 5 firings due that day on top of
    # that. Two unreliable triggers stacked do not make a reliable one.
    #
    # Hourly means a worker outage costs LATENESS, never a missed post: a slot is
    # either caught within LOOKAHEAD_MIN (15) and posted on time, or caught as
    # already-passed on the next wake and posted up to ~45 min late. Since the slot
    # is random anyway, drifting off it is invisible on the channel; not posting is
    # not. Costs ~16 idle check-ins/day (~1 billed minute each) against a 2000/month
    # allowance — the outage is worth far more than the ~240 minutes saved.
    # Times are UTC (EDT, UTC-4).
    - cron: "11 0-3,12-23 * * *"
  repository_dispatch:
    # cron-tick = upkeep poke; post-now = the worker firing just AFTER a slot time
    # passes, so the run builds and uploads born-public the moment it's done — no
    # held minutes at all (the slot is random, so the upload minute still is too).
    types: [cron-tick, post-now]
  workflow_dispatch:
    inputs:
      privacy:
        # PUBLIC by default. This used to default to unlisted so my test runs
        # wouldn't touch the channel — but that makes the safe-looking button do
        # the surprising thing: hitting "Run workflow" quietly produced an unlisted
        # video nobody could find. The default should be what you actually want;
        # pick unlisted deliberately when you're testing.
        description: "Privacy for this manual post"
        default: "public"
        type: choice
        options: [public, unlisted, private]
      dry_run:
        # Build the Short and hand it back as a downloadable artifact WITHOUT
        # posting to YouTube — for verifying a render change safely.
        description: "Dry run: build only, upload the .mp4 as an artifact, do NOT post to YouTube"
        default: false
        type: boolean
      diagnose:
        # Just probe the image endpoint and print why art succeeds/falls back.
        description: "Diagnose: probe the art endpoint (no video, no post), print results to the log"
        default: false
        type: boolean

concurrency:
  group: cooldecide-bot       # never two uploads at once
  cancel-in-progress: false

permissions:
  contents: write             # commit the updated dashboard data back

env:
  MAX_UPLOADS_PER_DAY: "2"
  PYTHONIOENCODING: "utf-8"

jobs:
  post:
    runs-on: ubuntu-latest
    # 115, not 25: a posting run now BUILDS EARLY and then HOLDS the upload until
    # the day's random slot (run.py), so the video is born public at that minute.
    # Worst case = ~86 min hold (largest gap between check-ins) + ~15 min build +
    # upload. Idle check-ins still exit in ~1 min; only the ~2 posting runs a day
    # hold, at the cost of extra billed Actions minutes while they sleep.
    timeout-minutes: 115
    steps:
      # `ref` is NOT optional here. Without it checkout takes github.sha — the commit
      # that existed when the run was CREATED — and this job can start well over an
      # hour later, because the concurrency group queues runs without refreshing that
      # snapshot (measured: created 01:17, started 03:09). The gate then counts
      # today's posts from a stale dashboard/kids.json and can decide to post again,
      # and the state commit is built on a base that main has already moved past.
      # Checking out the branch HEAD means every run reads what actually happened.
      # ref_name (not a literal "main") so a workflow_dispatch dry run from a feature
      # branch still tests THAT branch's code.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ---- cheap gate -----------------------------------------------------
      # Only the scheduler + its tiny deps. Everything heavy is skipped when it
      # isn't time, so an idle check-in costs ~1 billed minute.
      - name: Decide whether to post now
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "post=true" >> "$GITHUB_OUTPUT"
            echo "manual run -> posting"
          else
            # Single line on purpose: an indented heredoc into `python -c` sends
            # the leading whitespace to Python and dies with IndentationError.
            post=$(python -c "import scheduler; print('true' if scheduler.should_post() else 'false')")
            echo "post=$post" >> "$GITHUB_OUTPUT"
            python scheduler.py || true
          fi

      # ---- everything below only runs when it's actually time --------------
      - name: Install ffmpeg + emoji font
        if: steps.gate.outputs.post == 'true'
        # fonts-noto-color-emoji is the fallback artwork on every art-less panel
        # (card._emoji). Without it those panels render blank on the Linux runner.
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg fonts-noto-color-emoji

      - name: Install deps
        if: steps.gate.outputs.post == 'true'
        run: pip install -q -r requirements.txt

      - name: Restore credentials
        # Not needed for a dry run — it never talks to YouTube.
        if: steps.gate.outputs.post == 'true' && github.event.inputs.dry_run != 'true'
        env:
          YT_CLIENT_SECRET_B64: ${{ secrets.YT_CLIENT_SECRET_B64 }}
          YT_TOKEN_B64: ${{ secrets.YT_TOKEN_B64 }}
        run: |
          echo "$YT_CLIENT_SECRET_B64" | base64 -d > client_secret.json
          echo "$YT_TOKEN_B64" | base64 -d > yt_token.json

      - name: Diagnose art endpoint
        if: steps.gate.outputs.post == 'true' && github.event.inputs.diagnose == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POLLINATIONS_TOKEN: ${{ secrets.POLLINATIONS_TOKEN }}
        run: python -u tools/diag_art.py

      - name: Build (and post unless dry run)
        if: steps.gate.outputs.post == 'true' && github.event.inputs.diagnose != 'true'
        env:
          # Optional: without it the bot uses its 161 built-in questions instead
          # of writing fresh ones. It still posts either way.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional free Pollinations token (auth.pollinations.ai): lifts the anonymous
          # 1-req/15s image limit to 1/5s and enables nologo. Unset = anonymous, still works.
          POLLINATIONS_TOKEN: ${{ secrets.POLLINATIONS_TOKEN }}
          YT_PRIVACY: ${{ github.event.inputs.privacy || 'public' }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN — building only, will NOT post to YouTube"
            python -u run.py
          else
            python -u run.py --upload
          fi

      - name: Upload the built video (dry run)
        if: steps.gate.outputs.post == 'true' && github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cooldecide-test-video
          path: output/short.mp4
          if-no-files-found: error

      # The dashboard lives in a DIFFERENT repo, so this bot's own commit doesn't
      # reach it. Without this it silently freezes while the bot keeps posting.
      - name: Update the dashboard
        if: steps.gate.outputs.post == 'true' && github.event.inputs.dry_run != 'true' && github.event.inputs.diagnose != 'true'
        env:
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
        run: python -u sync_dashboard.py || true

      # The idle check-ins do the upkeep: refresh view counts and push the result to
      # the dashboard. Without this the board would only ever move twice a day, when
      # a video posts.
      #
      # This used to also run `run.py --comments-only`. That never worked: run.py
      # imports card/art, which need Pillow, and this step installs only the Google
      # libs — so every idle run died on ModuleNotFoundError, swallowed by `|| true`.
      # Self-commenting is off now (config.AUTO_COMMENT), so the call is gone rather
      # than fixed. Restoring it means installing the render deps too, not just
      # putting the line back.
      - name: Refresh stats + dashboard
        if: steps.gate.outputs.post != 'true'
        env:
          YT_CLIENT_SECRET_B64: ${{ secrets.YT_CLIENT_SECRET_B64 }}
          YT_TOKEN_B64: ${{ secrets.YT_TOKEN_B64 }}
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
        run: |
          pip install -q google-api-python-client google-auth google-auth-oauthlib
          echo "$YT_CLIENT_SECRET_B64" | base64 -d > client_secret.json
          echo "$YT_TOKEN_B64" | base64 -d > yt_token.json
          python -u -c "import dashboard; dashboard.refresh_stats()" || true
          python -u sync_dashboard.py || true

      # Never let a credential reach the commit, even on failure.
      - name: Shred credentials
        if: always()
        run: rm -f client_secret.json yt_token.json

      - name: Save dashboard data
        # A dry run / diagnose is a throwaway test — don't commit anything back.
        if: always() && github.event.inputs.dry_run != 'true' && github.event.inputs.diagnose != 'true'
        # No `|| true`. This step used to swallow every failure into a green check:
        # a conflicted `pull --rebase` left a detached HEAD, the push failed, and the
        # `|| echo` fallback exited 0 — which is how a live video (JUFdeYK8DJ4) ended
        # up recorded nowhere. tools/save_state.py merges onto a freshly-fetched base
        # instead of rebasing, retries if it loses a push race, and exits non-zero if
        # the state genuinely didn't persist. A state save that didn't happen SHOULD
        # fail the job.
        run: |
          git config user.name "cooldecide-bot"
          git config user.email "actions@github.com"
          python -u tools/save_state.py
